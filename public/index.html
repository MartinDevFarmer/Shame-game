<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Shame Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a1a;
      --card: #151530;
      --accent: #ff2d55;
      --accent2: #ff6b35;
      --gold: #ffd700;
      --text: #ffffff;
      --text-muted: #8888aa;
      --success: #34c759;
      --danger: #ff3b30;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    .screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; padding: 20px; animation: fadeIn 0.4s ease; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 60px; margin-bottom: 8px; letter-spacing: -1px; }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }

    input[type="text"] { width: 100%; max-width: 320px; padding: 14px 18px; border: 2px solid #2a2a4a; border-radius: 14px; background: var(--card); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.3s; }
    input:focus { border-color: var(--accent); }

    .btn { padding: 14px 32px; border: none; border-radius: 14px; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; max-width: 320px; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-secondary { background: var(--card); color: var(--text); border: 2px solid #2a2a4a; }
    .btn-success { background: linear-gradient(135deg, #34c759, #30b350); color: white; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #cc2200); color: white; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .gap { height: 14px; }
    .gap-sm { height: 8px; }

    /* Gender selector */
    .gender-selector { display: flex; gap: 12px; margin: 10px 0; width: 100%; max-width: 320px; }
    .gender-btn { flex: 1; padding: 14px; border: 2px solid #2a2a4a; border-radius: 14px; background: var(--card); color: var(--text-muted); font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
    .gender-btn.selected { border-color: var(--accent); color: var(--text); background: rgba(255, 45, 85, 0.15); }

    #home { justify-content: flex-start; }
    .home-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }

    .room-code-display { background: var(--card); border-radius: 16px; padding: 20px 40px; text-align: center; margin: 20px 0; }
    .room-code-label { font-size: 0.85rem; color: var(--text-muted); }
    .room-code-value { font-size: 2.8rem; font-weight: 900; letter-spacing: 8px; background: linear-gradient(135deg, var(--gold), #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .player-list { width: 100%; max-width: 360px; margin: 16px 0; }
    .player-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid #2a2a4a; border-radius: 30px; padding: 8px 16px; margin: 4px; font-size: 0.9rem; }
    .player-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
    .player-chip .gender-icon { font-size: 0.8rem; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    .tag-host { background: rgba(255, 215, 0, 0.2); color: var(--gold); }

    .setup-container { width: 100%; max-width: 380px; }
    .target-select { width: 100%; padding: 14px 18px; border: 2px solid #2a2a4a; border-radius: 14px; background: var(--card); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; appearance: none; -webkit-appearance: none; }
    .secret-entry { background: var(--card); border-radius: 14px; padding: 16px; margin: 10px 0; border: 1px solid #2a2a4a; }
    .secret-entry .type-label { font-size: 0.8rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    textarea { width: 100%; min-height: 80px; padding: 12px; border: 2px solid #2a2a4a; border-radius: 10px; background: #1a1a35; color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; resize: vertical; }
    textarea:focus { border-color: var(--accent); }

    .photo-upload-area { border: 2px dashed #3a3a5a; border-radius: 12px; padding: 24px; text-align: center; color: var(--text-muted); cursor: pointer; transition: border-color 0.3s; position: relative; overflow: hidden; }
    .photo-upload-area:hover { border-color: var(--accent); }
    .photo-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-upload-area img { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 8px; }

    .add-secret-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: transparent; border: 2px dashed #3a3a5a; border-radius: 14px; color: var(--text-muted); font-family: 'Poppins', sans-serif; font-size: 0.9rem; cursor: pointer; margin: 10px 0; }
    .add-secret-btn:hover { border-color: var(--accent); color: var(--accent); }
    .setup-progress { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 16px; }

    .slot-container { background: var(--card); border-radius: 20px; padding: 20px; margin: 30px auto; max-width: 280px; border: 3px solid var(--accent); position: relative; overflow: hidden; }
    .slot-window { height: 80px; overflow: hidden; position: relative; border-radius: 12px; background: #1a1a35; }
    .slot-track { transition: transform 3.5s cubic-bezier(0.15, 0.60, 0.10, 1.00); }
    .slot-item { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; padding: 0 20px; }
    .slot-highlight { position: absolute; inset: 0; border: 3px solid var(--gold); border-radius: 12px; pointer-events: none; box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.1); }

    .challenge-card { background: var(--card); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 360px; text-align: center; border: 2px solid #2a2a4a; margin: 20px 0; }
    .challenge-type { display: inline-block; padding: 4px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .challenge-type.question { background: rgba(0, 122, 255, 0.2); color: #4da6ff; }
    .challenge-type.dare { background: rgba(255, 45, 85, 0.2); color: var(--accent); }
    .challenge-text { font-size: 1.15rem; line-height: 1.5; margin-bottom: 20px; }
    .challenge-player { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, var(--gold), #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .challenge-buttons { display: flex; gap: 12px; margin-top: 16px; }
    .challenge-buttons .btn { flex: 1; max-width: none; }

    .reveal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.92); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 30px; animation: fadeIn 0.5s ease; }
    .reveal-overlay.active { display: flex; }
    .reveal-header { font-size: 1.2rem; color: var(--danger); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 24px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .reveal-content { background: var(--card); border-radius: 20px; padding: 24px; max-width: 360px; width: 100%; text-align: center; border: 2px solid var(--danger); }
    .reveal-content img { max-width: 100%; max-height: 300px; border-radius: 12px; margin: 12px 0; }
    .reveal-text { font-size: 1.1rem; line-height: 1.5; margin: 12px 0; }
    .reveal-by { font-size: 0.8rem; color: var(--text-muted); margin-top: 12px; }

    .waiting { display: none; position: fixed; inset: 0; background: rgba(10, 10, 26, 0.95); z-index: 50; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .waiting.active { display: flex; }
    .spinner { width: 50px; height: 50px; border: 4px solid #2a2a4a; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 8px; text-align: center; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin: 20px 0 12px; text-align: center; }
    .section-subtitle { color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-bottom: 16px; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid #2a2a4a; padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(20px); } }

    /* Timer */
    .timer-ring { width: 80px; height: 80px; margin: 16px auto; position: relative; }
    .timer-ring svg { transform: rotate(-90deg); width: 80px; height: 80px; }
    .timer-ring circle { fill: none; stroke-width: 6; }
    .timer-ring .bg { stroke: #2a2a4a; }
    .timer-ring .progress { stroke: var(--accent); stroke-linecap: round; stroke-dasharray: 226; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .timer-ring .progress.urgent { stroke: var(--danger); }
    .timer-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; }
    .timer-number.urgent { color: var(--danger); }

    .partner-tag { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: rgba(255, 107, 53, 0.2); color: var(--accent2); margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="home" class="screen active">
    <div class="logo">SHAME GAME</div>
    <div class="subtitle">Le jeu qui met tes potes à nu</div>
    <div class="home-buttons">
      <input type="text" id="playerNameInput" placeholder="Ton prénom" maxlength="20" autocomplete="off">
      <div class="gender-selector">
        <button class="gender-btn" id="genderM" onclick="selectGender('M')">Garçon</button>
        <button class="gender-btn" id="genderF" onclick="selectGender('F')">Fille</button>
      </div>
      <button class="btn btn-primary" id="createRoomBtn">Créer une partie</button>
      <div class="gap-sm"></div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="roomCodeInput" placeholder="Code" maxlength="4" style="max-width:120px;text-transform:uppercase;text-align:center;letter-spacing:4px;font-weight:700;">
        <button class="btn btn-secondary" id="joinRoomBtn" style="flex:1;">Rejoindre</button>
      </div>
      <div id="homeError" class="error-msg"></div>
    </div>
  </div>

  <!-- LOBBY -->
  <div id="lobby" class="screen">
    <div class="section-title">Salle d'attente</div>
    <div class="room-code-display">
      <div class="room-code-label">Code de la partie</div>
      <div class="room-code-value" id="lobbyCode"></div>
    </div>
    <div class="section-subtitle">Joueurs connectés</div>
    <div class="player-list" id="lobbyPlayers"></div>
    <div style="margin-top:auto; padding-bottom:20px; width:100%; max-width:320px;">
      <button class="btn btn-primary" id="startGameBtn" style="display:none;">Lancer la partie</button>
      <p class="section-subtitle" id="waitingHost" style="display:none;">En attente du lancement...</p>
    </div>
  </div>

  <!-- SETUP -->
  <div id="setup" class="screen">
    <div class="section-title">Phase secrète</div>
    <div class="section-subtitle">Balance les pires secrets de tes potes</div>
    <div class="setup-container">
      <div id="secretsList"></div>
      <button class="add-secret-btn" id="addAnecdoteBtn">+ Ajouter une anecdote</button>
      <button class="add-secret-btn" id="addPhotoBtn">+ Ajouter une photo</button>
      <div class="gap"></div>
      <button class="btn btn-primary" id="submitSecretsBtn" disabled>Valider mes secrets</button>
      <div class="setup-progress" id="setupProgress"></div>
    </div>
    <div class="waiting" id="setupWaiting">
      <div class="spinner"></div>
      <div>Secrets envoyés ! En attente des autres joueurs...</div>
      <div class="setup-progress" id="setupProgressWaiting"></div>
      <button class="btn btn-primary" id="forceStartBtn" style="display:none;max-width:280px;margin-top:20px;">Lancer quand même</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <div class="logo" style="font-size:1.5rem;margin-top:30px;">SHAME GAME</div>

    <div id="spinSection">
      <div class="section-subtitle" style="margin-top:20px;">La roulette tourne...</div>
      <div class="slot-container">
        <div class="slot-window">
          <div class="slot-track" id="slotTrack"></div>
          <div class="slot-highlight"></div>
        </div>
      </div>
    </div>

    <div id="challengeSection" style="display:none;">
      <div class="challenge-card">
        <div class="challenge-player" id="challengePlayer"></div>
        <div class="timer-ring" id="timerRing">
          <svg viewBox="0 0 80 80">
            <circle class="bg" cx="40" cy="40" r="36"/>
            <circle class="progress" id="timerProgress" cx="40" cy="40" r="36"/>
          </svg>
          <div class="timer-number" id="timerNumber">25</div>
        </div>
        <div class="challenge-type" id="challengeType"></div>
        <div class="challenge-text" id="challengeText"></div>
        <div id="partnerInfo" style="display:none;"><div class="partner-tag" id="partnerTag"></div></div>
        <div class="challenge-buttons" id="challengeButtons"></div>
      </div>
    </div>

    <div id="acceptedSection" style="display:none; text-align:center; margin-top:40px;">
      <div style="font-size:3rem;" id="acceptedIcon">✅</div>
      <div class="section-title" id="acceptedMsg"></div>
      <div class="gap"></div>
      <button class="btn btn-primary" id="nextTurnBtn" style="display:none;max-width:300px;margin:16px auto;" onclick="triggerNextTurn()"></button>
    </div>
  </div>

  <!-- SECRET REVEAL -->
  <div class="reveal-overlay" id="revealOverlay">
    <div class="reveal-header">SECRET RÉVÉLÉ</div>
    <div class="reveal-content">
      <div class="challenge-player" id="revealPlayer"></div>
      <div id="revealBody"></div>
      <div class="reveal-by" id="revealBy"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myName = '';
    let myGender = '';
    let roomCode = '';
    let isHost = false;
    let players = [];
    let secrets = [];

    const $ = id => document.getElementById(id);

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // =================== GENDER ===================
    function selectGender(g) {
      myGender = g;
      $('genderM').classList.toggle('selected', g === 'M');
      $('genderF').classList.toggle('selected', g === 'F');
    }

    // =================== HOME ===================
    $('createRoomBtn').onclick = () => {
      const name = $('playerNameInput').value.trim();
      if (!name) { $('homeError').textContent = 'Entre ton prénom !'; return; }
      if (!myGender) { $('homeError').textContent = 'Choisis Garçon ou Fille !'; return; }
      myName = name;
      isHost = true;
      socket.emit('create-room', { playerName: name, gender: myGender }, (res) => {
        if (res.success) {
          roomCode = res.roomCode;
          players = res.players;
          renderLobby();
          showScreen('lobby');
        }
      });
    };

    $('joinRoomBtn').onclick = () => {
      const name = $('playerNameInput').value.trim();
      const code = $('roomCodeInput').value.trim().toUpperCase();
      if (!name) { $('homeError').textContent = 'Entre ton prénom !'; return; }
      if (!myGender) { $('homeError').textContent = 'Choisis Garçon ou Fille !'; return; }
      if (!code) { $('homeError').textContent = 'Entre le code de la room !'; return; }
      myName = name;
      socket.emit('join-room', { roomCode: code, playerName: name, gender: myGender }, (res) => {
        if (res.success) {
          roomCode = res.roomCode;
          players = res.players;
          renderLobby();
          showScreen('lobby');
        } else {
          $('homeError').textContent = res.error;
        }
      });
    };

    $('playerNameInput').onkeydown = e => { if (e.key === 'Enter') $('createRoomBtn').click(); };
    $('roomCodeInput').onkeydown = e => { if (e.key === 'Enter') $('joinRoomBtn').click(); };

    // =================== LOBBY ===================
    function renderLobby() {
      $('lobbyCode').textContent = roomCode;
      $('lobbyPlayers').innerHTML = players.map((p, i) => {
        const icon = p.gender === 'M' ? '♂' : '♀';
        return `<div class="player-chip"><span class="dot"></span><span class="gender-icon">${icon}</span> ${p.name}${i === 0 ? ' <span class="tag tag-host">HOST</span>' : ''}</div>`;
      }).join('');

      if (isHost) {
        $('startGameBtn').style.display = 'block';
        $('waitingHost').style.display = 'none';
        $('startGameBtn').disabled = players.length < 2;
      } else {
        $('startGameBtn').style.display = 'none';
        $('waitingHost').style.display = 'block';
      }
    }

    socket.on('player-joined', (data) => {
      players = data.players;
      renderLobby();
      showToast('Un joueur a rejoint !');
    });

    $('startGameBtn').onclick = () => { socket.emit('start-setup', roomCode); };

    // =================== SETUP ===================
    socket.on('phase-change', (data) => {
      if (data.phase === 'setup') {
        players = data.players;
        renderSetup();
        showScreen('setup');
      } else if (data.phase === 'game') {
        showScreen('game');
      }
    });

    function renderSetup() {
      secrets = [];
      renderSecrets();
    }

    function getOtherPlayers() {
      return players.filter(p => p.name !== myName);
    }

    function buildTargetOptions(selectedName) {
      const others = getOtherPlayers();
      let html = '<option value="">Victime...</option>';
      others.forEach(p => {
        const icon = p.gender === 'M' ? '♂' : '♀';
        const sel = p.name === selectedName ? 'selected' : '';
        html += `<option value="${p.name}" ${sel}>${icon} ${p.name}</option>`;
      });
      return html;
    }

    let secretIdCounter = 0;
    $('addAnecdoteBtn').onclick = () => { secrets.push({ id: ++secretIdCounter, type: 'anecdote', content: '', target: '' }); renderSecrets(); };
    $('addPhotoBtn').onclick = () => { secrets.push({ id: ++secretIdCounter, type: 'photo', content: '', target: '' }); renderSecrets(); };

    function renderSecrets() {
      const list = $('secretsList');
      list.innerHTML = '';
      secrets.forEach((s) => {
        const div = document.createElement('div');
        div.className = 'secret-entry';
        const targetSelect = `<select class="target-select" style="font-size:0.85rem;padding:8px 12px;max-width:160px;" onchange="updateSecretTarget(${s.id}, this.value)">${buildTargetOptions(s.target)}</select>`;

        if (s.type === 'anecdote') {
          div.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
              <div class="type-label">Anecdote</div>
              ${targetSelect}
              <button onclick="removeSecret(${s.id})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.2rem;">✕</button>
            </div>
            <textarea placeholder="Raconte le pire truc que tu sais sur cette personne..." oninput="updateSecret(${s.id}, this.value)">${s.content}</textarea>`;
        } else {
          div.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
              <div class="type-label">Photo</div>
              ${targetSelect}
              <button onclick="removeSecret(${s.id})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.2rem;">✕</button>
            </div>
            <div class="photo-upload-area">
              ${s.content ? `<img src="${s.content}">` : 'Tape pour ajouter une photo'}
              <input type="file" accept="image/*" onchange="uploadPhoto(${s.id}, this)">
            </div>`;
        }
        list.appendChild(div);
      });
      validateSetup();
    }

    function removeSecret(id) { secrets = secrets.filter(s => s.id !== id); renderSecrets(); }
    function updateSecret(id, value) { const s = secrets.find(s => s.id === id); if (s) s.content = value; validateSetup(); }
    function updateSecretTarget(id, value) { const s = secrets.find(s => s.id === id); if (s) s.target = value; validateSetup(); }

    async function uploadPhoto(id, input) {
      const file = input.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('photo', file);
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.url) { const s = secrets.find(s => s.id === id); if (s) s.content = data.url; renderSecrets(); }
      } catch (e) { showToast('Erreur upload photo'); }
    }

    function validateSetup() {
      const allValid = secrets.length > 0 && secrets.every(s => s.content.trim() && s.target);
      $('submitSecretsBtn').disabled = !allValid;
    }

    $('submitSecretsBtn').onclick = () => {
      // Group secrets by target player
      const byTarget = {};
      secrets.forEach(s => {
        if (!byTarget[s.target]) byTarget[s.target] = [];
        byTarget[s.target].push({ type: s.type, content: s.content });
      });

      const targets = Object.keys(byTarget);
      let done = 0;

      targets.forEach(target => {
        socket.emit('submit-secret', {
          roomCode,
          targetPlayer: target,
          secrets: byTarget[target]
        }, (res) => {
          done++;
          if (done === targets.length) {
            // All secrets sent, now signal we're done
            socket.emit('setup-done', roomCode);
            $('setupWaiting').classList.add('active');
          }
        });
      });
    };

    socket.on('setup-progress', (data) => {
      const msg = `${data.done}/${data.total} joueurs prêts`;
      $('setupProgress').textContent = msg;
      $('setupProgressWaiting').textContent = msg;
      if (isHost && data.done >= 1 && data.done < data.total) {
        $('forceStartBtn').style.display = 'block';
      }
    });

    $('forceStartBtn').onclick = () => { socket.emit('force-start-game', roomCode); };

    // =================== GAME ===================
    let timerInterval = null;
    let pendingResult = null;

    socket.on('start-spin', (data) => {
      $('spinSection').style.display = 'block';
      $('challengeSection').style.display = 'none';
      $('acceptedSection').style.display = 'none';
      $('revealOverlay').classList.remove('active');
      buildSlotMachine(data.players);
      setTimeout(() => startSlotSpin(data.players), 800);
      setTimeout(() => socket.emit('request-spin-result', roomCode), 500);
    });

    socket.on('spin-result', (data) => { pendingResult = data; });

    function buildSlotMachine(playerList) {
      const track = $('slotTrack');
      let items = '';
      for (let i = 0; i < 40; i++) {
        const p = playerList[i % playerList.length];
        items += `<div class="slot-item">${p.name}</div>`;
      }
      track.innerHTML = items;
      track.style.transition = 'none';
      track.style.transform = 'translateY(0)';
    }

    function startSlotSpin(playerList) {
      const waitForResult = () => {
        if (!pendingResult) { setTimeout(waitForResult, 100); return; }
        const targetName = pendingResult.playerName;
        const track = $('slotTrack');
        let targetIndex = -1;
        for (let i = 30; i >= 20; i--) {
          if (playerList[i % playerList.length].name === targetName) { targetIndex = i; break; }
        }
        if (targetIndex === -1) targetIndex = 25;
        const offset = targetIndex * 80;
        track.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.60, 0.10, 1.00)';
        track.style.transform = `translateY(-${offset}px)`;
        setTimeout(() => showChallenge(pendingResult), 4000);
      };
      waitForResult();
    }

    function showChallenge(data) {
      pendingResult = null;
      $('spinSection').style.display = 'none';
      $('challengeSection').style.display = 'block';
      $('partnerInfo').style.display = 'none';

      $('challengePlayer').textContent = data.playerName;
      const typeEl = $('challengeType');
      typeEl.textContent = data.challenge.challengeType === 'question' ? 'Vérité' : 'Action';
      typeEl.className = 'challenge-type ' + data.challenge.challengeType;
      $('challengeText').textContent = data.challenge.text;

      const btns = $('challengeButtons');
      if (data.playerName === myName) {
        btns.innerHTML = `
          <button class="btn btn-success" onclick="acceptChallenge()">J'accepte ✅</button>
          ${data.canRefuse ? `<button class="btn btn-danger" onclick="refuseChallenge()">Je refuse 💀</button>` : ''}
        `;
      } else {
        btns.innerHTML = `<div class="section-subtitle">C'est au tour de ${data.playerName}...</div>`;
      }
      startTimer(25);
    }

    // --- PARTNER FLOW (duo dares) ---
    socket.on('waiting-for-partner', (data) => {
      stopTimer();
      $('spinSection').style.display = 'none';
      $('challengeSection').style.display = 'block';
      $('acceptedSection').style.display = 'none';

      $('challengePlayer').textContent = data.playerName;
      const typeEl = $('challengeType');
      typeEl.textContent = 'Action';
      typeEl.className = 'challenge-type dare';
      $('challengeText').textContent = data.challenge.text;
      $('partnerInfo').style.display = 'block';

      const btns = $('challengeButtons');
      if (data.partnerName === myName) {
        $('partnerTag').textContent = `${data.playerName} a accepté ! C'est à toi de décider`;
        btns.innerHTML = `
          <button class="btn btn-success" onclick="partnerAccept()">J'accepte ✅</button>
          ${data.canRefuse ? `<button class="btn btn-danger" onclick="partnerRefuse()">Je refuse 💀</button>` : ''}
        `;
      } else {
        $('partnerTag').textContent = `En attente de ${data.partnerName}...`;
        btns.innerHTML = `<div class="section-subtitle">${data.playerName} a accepté, en attente de ${data.partnerName}...</div>`;
      }
      startTimer(25);
    });

    function partnerAccept() { stopTimer(); socket.emit('partner-accept', roomCode); }
    function partnerRefuse() { stopTimer(); socket.emit('partner-refuse', roomCode); }

    // --- TIMER ---
    function startTimer(seconds) {
      if (timerInterval) clearInterval(timerInterval);
      let remaining = seconds;
      const circumference = 226;
      const progress = $('timerProgress');
      const number = $('timerNumber');
      progress.style.transition = 'none';
      progress.style.strokeDashoffset = '0';
      progress.classList.remove('urgent');
      number.classList.remove('urgent');
      number.textContent = remaining;
      progress.getBoundingClientRect();
      progress.style.transition = 'stroke-dashoffset 1s linear';
      timerInterval = setInterval(() => {
        remaining--;
        number.textContent = remaining;
        const offset = circumference * (1 - remaining / seconds);
        progress.style.strokeDashoffset = offset;
        if (remaining <= 3) { progress.classList.add('urgent'); number.classList.add('urgent'); }
        if (remaining <= 0) { clearInterval(timerInterval); timerInterval = null; }
      }, 1000);
    }

    function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

    function acceptChallenge() { stopTimer(); socket.emit('accept-challenge', roomCode); }
    function refuseChallenge() { stopTimer(); socket.emit('refuse-challenge', roomCode); }
    function triggerNextTurn() { socket.emit('next-turn', roomCode); }

    let lastChallengeType = null;

    socket.on('challenge-accepted', (data) => {
      stopTimer();
      $('challengeSection').style.display = 'none';
      $('acceptedSection').style.display = 'block';
      $('acceptedIcon').textContent = '✅';
      lastChallengeType = data.challenge ? data.challenge.challengeType : 'dare';

      if (data.partnerName) {
        $('acceptedMsg').textContent = `${data.playerName} et ${data.partnerName} ont accepté !`;
      } else {
        $('acceptedMsg').textContent = `${data.playerName} a accepté !`;
      }

      // Show "next" button for host
      const btn = $('nextTurnBtn');
      if (isHost) {
        btn.style.display = 'block';
        btn.textContent = lastChallengeType === 'question' ? 'Question répondue ✓' : 'Gage effectué ✓';
      } else {
        btn.style.display = 'none';
      }
    });

    socket.on('challenge-timeout', (data) => {
      stopTimer();
      $('challengeSection').style.display = 'none';
      $('acceptedSection').style.display = 'block';
      $('acceptedIcon').textContent = '⏰';
      $('acceptedMsg').textContent = `Temps écoulé pour ${data.playerName} !`;
    });

    socket.on('secret-revealed', (data) => {
      stopTimer();
      $('challengeSection').style.display = 'none';
      $('acceptedSection').style.display = 'none';
      $('revealOverlay').classList.add('active');
      $('revealPlayer').textContent = data.playerName;
      const body = $('revealBody');
      if (data.secret.type === 'photo') {
        body.innerHTML = `<img src="${data.secret.content}" alt="Photo">`;
      } else {
        body.innerHTML = `<div class="reveal-text">${data.secret.content}</div>`;
      }
      $('revealBy').textContent = `Balancé par ${data.secret.submittedBy}`;
    });

    socket.on('player-disconnected', (data) => { showToast(`${data.playerName} s'est déconnecté`); });
    socket.on('room-closed', () => { showToast('La room a été fermée'); showScreen('home'); });
  </script>
</body>
</html>
